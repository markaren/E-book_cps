site_name: AIS2203 E-book
site_description: Course e-book for AIS2203 — Computer Engineering for Cyber-Physical Systems
site_url: https://markaren.github.io/E-book_cps/
repo_url: https://github.com/markaren/E-book_cps
repo_name: markaren/E-book_cps
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tracking
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: nb
          name: Norsk (bokmål)
          build: true
          nav_translations:
            Home: Hjem
            Getting Started: Kom i gang
            From AIS1003 to AIS2203: Fra AIS1003 til AIS2203
            "1. Modern C++ Toolkit": "1. Moderne C++-verktøykasse"
            Ownership & RAII: Eierskap og RAII
            Move Semantics: Flyttesemantikk
            Smart Pointers: Smartpekere
            Templates & Generic Code: Maler og generisk kode
            Lambdas & std::function: Lambda-uttrykk og std::function
            Time with std::chrono: Tid med std::chrono
            Exercises: Oppgaver
            "2. Concurrency Fundamentals": "2. Grunnleggende samtidighet"
            Processes & Threads: Prosesser og tråder
            Creating Threads: Opprette tråder
            Sharing Data: Deling av data
            Condition Variables: Tilstandsvariabler
            Atomics: Atomære operasjoner
            "3. Asynchronous & Real-Time": "3. Asynkront og sanntid"
            Futures & Promises: Futures og promises
            Thread Pools: Trådbasseng
            Parallel Algorithms: Parallelle algoritmer
            Coroutines: Korutiner
            Real-Time & Timing: Sanntid og tidsstyring
            "4. Data Communication": "4. Datakommunikasjon"
            Serialization: Serialisering
            "Sockets, TCP & UDP": "Sockets, TCP og UDP"
            Networking in C++: Nettverk i C++
            Serial Communication: Seriekommunikasjon
            MQTT & RPC: MQTT og RPC
            Embedded Linux: Embedded Linux
            "5. Building Larger Projects": "5. Bygge større prosjekter"
            CMake for Multi-Target Projects: CMake for prosjekter med flere mål
            Dependencies with vcpkg: Avhengigheter med vcpkg
            Calling C++ from Python: Kalle C++ fra Python
            "6. Computer Vision": "6. Datasyn"
            OpenCV in C++: OpenCV i C++
            Camera Calibration: Kamerakalibrering
            Deep Vision: Dyp datasyn
            Model Deployment & ONNX: Modellutrulling og ONNX
            Virtual Environments: Virtuelle miljøer
            Reference: Referanse
            Debugging Concurrent Programs: Feilsøke samtidige programmer
            Portability: Portabilitet
            Using AI for Coding: Bruke KI til koding
            Common Terms: Vanlige begreper
            FAQ: Ofte stilte spørsmål

hooks:
  - hooks/compiler_explorer.py

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/spoiler.js

